<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>No Internet – Attendix</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a40c8 0%, #2563eb 50%, #1e88e5 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      padding: 24px;
    }
    .blob1 {
      position: fixed; width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(255,255,255,0.07) 0%, transparent 70%);
      border-radius: 50%; top: -100px; right: -100px; pointer-events: none;
    }
    .blob2 {
      position: fixed; width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
      border-radius: 50%; bottom: -80px; left: -60px; pointer-events: none;
    }
    .card {
      background: rgba(255,255,255,0.09);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 28px;
      padding: 48px 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 32px 64px rgba(0,0,0,0.25);
      animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.94) translateY(16px); }
      to   { opacity: 1; transform: scale(1)    translateY(0); }
    }
    .logo {
      width: 96px; height: 96px;
      border-radius: 22px;
      margin: 0 auto 24px;
      display: block;
      box-shadow: 0 8px 32px rgba(0,0,0,0.28), 0 0 0 1px rgba(255,255,255,0.14);
      animation: logoIn 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;
    }
    @keyframes logoIn {
      from { opacity: 0; transform: scale(0.6) translateY(12px); }
      to   { opacity: 1; transform: scale(1)   translateY(0); }
    }
    .icon-wrap {
      width: 60px; height: 60px;
      background: rgba(255,255,255,0.12);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 22px;
      animation: fadeUp 0.5s ease 0.2s both;
    }
    h1 {
      font-size: 1.5rem; font-weight: 700;
      letter-spacing: -0.02em; margin-bottom: 12px;
      animation: fadeUp 0.5s ease 0.3s both;
    }
    p {
      font-size: 0.9rem; color: rgba(255,255,255,0.72);
      line-height: 1.65; margin-bottom: 32px;
      animation: fadeUp 0.5s ease 0.35s both;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: #fff; color: #1d4ed8;
      font-weight: 600; font-size: 0.95rem;
      padding: 14px 32px; border-radius: 14px;
      border: none; cursor: pointer; text-decoration: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      transition: transform 0.15s, box-shadow 0.15s;
      animation: fadeUp 0.5s ease 0.4s both;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
    .btn:active { transform: scale(0.97); }
    .dots {
      display: flex; justify-content: center;
      gap: 6px; margin-top: 28px;
      animation: fadeUp 0.5s ease 0.5s both;
    }
    .dot {
      width: 6px; height: 6px;
      background: rgba(255,255,255,0.45);
      border-radius: 50%;
      animation: dotPulse 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40%            { opacity: 1;   transform: scale(1);   }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="blob1"></div>
  <div class="blob2"></div>
  <div class="card">
    <img src="/attendix-logo.png" alt="Attendix" class="logo" />
    <div class="icon-wrap">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20" stroke-width="3"/>
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>No internet connection detected.<br>Please check your Wi-Fi or mobile data<br>and try again.</p>
    <a href="/" class="btn" onclick="window.location.reload(); return false;">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Try Again
    </a>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
